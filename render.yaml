services:
  - type: web
    name: portoku
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_PIN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REFRESH_TOKEN
        sync: false
      - key: SPREADSHEET_ID
        sync: false